<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Slice Pizza</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #fff3e0;
            text-align: center;
        }
        header {
            background-color: #e74c3c;
            color: white;
            padding: 20px;
        }
        h1 {
            margin: 0;
        }
        .menu {
            padding: 20px;
        }
        .pizza {
            background: white;
            margin: 15px auto;
            padding: 15px;
            width: 250px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .order-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 20px;
            background-color: #27ae60;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 16px;
        }
        .order-btn:hover {
            background-color: #1e8449;
        }
        footer {
            margin-top: 30px;
            padding: 15px;
            background-color: #333;
            color: white;
        }
    </style>
</head>
<body>

<header>
    <h1>🍕 Hot Slice Pizza</h1>
    <p>Fresh • Hot • Delicious</p>
</header>

<div class="menu">
    <h2>Our Menu</h2>

    <div class="pizza">
        <h3>Cheese Pizza</h3>
        <p>$8.99</p>
    </div>

    <div class="pizza">
        <h3>Pepperoni Pizza</h3>
        <p>$10.99</p>
    </div>

    <div class="pizza">
        <h3>Supreme Pizza</h3>
        <p>$12.99</p>
    </div>

    <!-- Phone button -->
    <a href="tel:7733265409" class="order-btn">
        📞 Call to Order: 773-326-5409
    </a>
</div>

<footer>
    <p>Open Daily | Fast Delivery 🚗</p>
</footer>

</body>
</html>
